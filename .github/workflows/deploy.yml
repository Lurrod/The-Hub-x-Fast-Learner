name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-fl-bot
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Sanity check: must start with PEM header
          head -1 ~/.ssh/id_deploy | grep -q "BEGIN" || { echo "::error::SSH_PRIVATE_KEY does not look like a PEM key"; exit 1; }
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync project to server
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='__pycache__/' \
            --exclude='.pytest_cache/' \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='logs/' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='test_*.py' \
            --exclude='conftest.py' \
            --exclude='pytest.ini' \
            --exclude='requirements-test.txt' \
            --exclude='preview_leaderboard.py' \
            --exclude='seed_users.py' \
            --exclude='leaderboard_preview/' \
            --exclude='idées.txt' \
            --exclude='FONCTIONNALITES.txt' \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.SSH_PORT || '22' }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Install dependencies and reload PM2
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${{ secrets.DEPLOY_PATH }}"

          if [ ! -d venv ]; then
            python3.12 -m venv venv
          fi

          # shellcheck disable=SC1091
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          mkdir -p logs

          # startOrRestart re-reads ecosystem.config.js (script, interpreter, cwd, env)
          # — unlike reload which keeps the cached config from the original `start`.
          pm2 startOrRestart ecosystem.config.js --update-env
          pm2 save
          REMOTE
