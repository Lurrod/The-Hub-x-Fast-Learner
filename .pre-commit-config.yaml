# Pre-commit hooks to prevent unformatted / unlinted commits.
#
# Installation (once):
#   pip install pre-commit
#   pre-commit install
#
# After installation, each `git commit` triggers ruff + format check.
# Intentional bypass: `git commit --no-verify` (to be avoided).

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Linting: fails if a ruff error blocks (cf. ignore-list in pyproject.toml).
      - id: ruff
        args: ["--fix"]
      # Format check: rejects unformatted files (auto-fix with --fix-only).
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      # Prevents the UTF-8 BOM reappearing, introduced by PowerShell `Set-Content`
      # / `Out-File` by default on PS 5.1. Cf. AUDIT.md (2026-05-21).
      - id: fix-byte-order-marker

  # mypy: strict-ish type check on the source code (tests excluded to
  # keep the hook fast and avoid duct-tape annotations on fixture mocks).
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^(bot\.py|cogs/|services/)
        additional_dependencies:
          - discord.py>=2.5,<3
          - pymongo>=4.6,<5
          - pillow>=12.1.1,<13
          - requests>=2.31,<3
          - python-dotenv>=1.0,<2

  # pip-audit: fail the commit on HIGH-severity CVEs in dependencies.
  # Reads requirements.txt directly; the lockfile is also covered by
  # `pip-audit -r requirements.lock` when generated.
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args: ["-r", "requirements.txt", "--strict"]
