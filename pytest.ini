[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    # `_aget` coroutine never awaited: comes from discord.utils.get/find called
    # by discord.py on iterable mocks (non-async). Harmless in tests
    # (Discord mocks do not dispatch the coroutine), but pollutes the report.
    ignore:coroutine '_aget' was never awaited:RuntimeWarning
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    unit: tests unitaires (logique pure, sans I/O)
    integration: integration tests (with Discord/Mongo fakes)
